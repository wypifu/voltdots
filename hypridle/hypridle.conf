# voltdots — hypridle.conf
# On AC: screen off then lock
# On battery: screen off, lock, then hibernate after 15min

general {
    lock_cmd = hyprlock
    unlock_cmd = none
    before_sleep_cmd = hyprlock
}

# --- AC power ---
listener {
    timeout = 300  # 5min — screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 360  # 6min — lock
    on-timeout = hyprlock
    on-resume = none
}

# --- Battery power ---
listener {
    timeout = 180  # 3min — screen off on battery
    on-timeout = $(/usr/bin/cat /sys/class/power_supply/AC*/online 2>/dev/null | grep -q 0) && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 240  # 4min — lock on battery
    on-timeout = $(/usr/bin/cat /sys/class/power_supply/AC*/online 2>/dev/null | grep -q 0) && hyprlock
    on-resume = none
}

listener {
    timeout = 900  # 15min — hibernate on battery
    on-timeout = $(/usr/bin/cat /sys/class/power_supply/AC*/online 2>/dev/null | grep -q 0) && systemctl hibernate
    on-resume = none
}
