# voltdots — animations.conf
# Smooth animations inspired by Material Design

animations {
    enabled = true

    # Bezier curves
    bezier = easeOutQuint,  0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.35, 0.95
    bezier = easeOutBack,   0.34, 1.56, 0.64, 1
    bezier = linear,        0, 0, 1, 1
    bezier = snap,          0.19, 1, 0.22, 1

    # Windows
    animation = windows,     1, 5,  easeOutBack,   slide
    animation = windowsOut,  1, 4,  easeInOutCubic, slide
    animation = windowsMove, 1, 4,  easeOutQuint

    # Borders
    animation = border,      1, 10, linear
    animation = borderangle, 1, 30, linear, loop

    # Fade
    animation = fade,        1, 4,  easeOutQuint
    animation = fadeOut,     1, 3,  easeInOutCubic

    # Workspaces
    animation = workspaces,  1, 5,  easeOutQuint,  slide
    animation = specialWorkspace, 1, 4, easeOutBack, slidevert
}
