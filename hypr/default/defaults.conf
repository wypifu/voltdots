# voltdots — defaults.conf
# Default app preferences — copy to custom/defaults.conf and edit
# Machine-specific overrides in custom/defaults.conf will take priority

# Terminal
export VOLTTERM="terminator"
export VOLTTERM_FALLBACK="kitty gnome-terminal foot ghostty "

# File manager
export VOLTFILES="thunar"
export VOLTFILES_FALLBACK="nautilus"

# Browser
export VOLTBROWSER="firefox"
export VOLTBROWSER_FALLBACK="chromium yandex-browser"

# Editor
export VOLTEDITOR="codium"
export VOLTEDITOR_FALLBACK="code nvim"

# Launcher
export VOLTLAUNCHER="rofi -show drun"

# Video player
export VOLTVIDEO="celluloid"
export VOLTVIDEO_FALLBACK="vlc mpv"

# Image viewer
export VOLTIMAGES="loupe"
export VOLTIMAGES_FALLBACK="gthumb eog"

# PDF viewer
export VOLTPDF="zathura"
export VOLTPDF_FALLBACK="evince"

# Wallpaper
export VOLT_WALLPAPER_DIR="$HOME/Pictures/Wallpapers"
export VOLT_WALLPAPER_AUTO=false  # true = auto change, false = fixed
export VOLT_WALLPAPER_DELAY=900  # seconds — 15 minutes
export VOLT_WALLPAPER_FALLBACK="$HOME/.voltdots/themes/bkpview/wallpaper.png"

# Weather
export VOLT_WEATHER_CITY="Beijing"
export VOLT_WEATHER_CITY2="Paris"
export VOLT_WEATHER_UNIT="metric"
