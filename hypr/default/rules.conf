# voltdots — rules.conf
# Window rules — Hyprland 0.55 syntax

# --- Floating windows ---
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(pavucontrol-qt)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# --- Picture in Picture ---
windowrule = keep_aspect_ratio on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$

# --- Idle inhibit ---
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$
windowrule = idle_inhibit fullscreen, match:class ^(chromium)$
windowrule = idle_inhibit always, match:class ^(celluloid)$
windowrule = idle_inhibit always, match:class ^(mpv)$
windowrule = idle_inhibit always, match:class ^(vlc)$
windowrule = idle_inhibit always, match:class ^(totem)$

# --- Workspace assignments ---
windowrule = workspace 10 silent, match:class ^(astrill)$
windowrule = float on, match:class ^(astrill)$

# --- Opacity ---
windowrule = opacity 0.95 0.90, match:class ^(thunar)$
windowrule = opacity 0.95 0.90, match:class ^(codium)$

# --- Fcitx5 ---
windowrule = no_focus on, match:class ^(fcitx)$

# --- Layer blur ---
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.3, match:namespace wofi
layerrule = blur on, match:namespace fuzzel
layerrule = ignore_alpha 0.3, match:namespace fuzzel
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
