# voltdots — keybinds.conf
# Default keybindings — use custom/keybinds.conf to override

# --- Variables ---
# Replace the $terminal, $filemanager etc. lines with:
$terminal    = ~/.voltdots/scripts/launch_app.sh terminal
$filemanager = ~/.voltdots/scripts/launch_app.sh filemanager
$browser     = ~/.voltdots/scripts/launch_app.sh browser
$editor      = ~/.voltdots/scripts/launch_app.sh editor
$video       = ~/.voltdots/scripts/launch_app.sh video
$images      = ~/.voltdots/scripts/launch_app.sh images
$pdf         = ~/.voltdots/scripts/launch_app.sh pdf
$launcher = rofi -show drun
$screenshot = ~/.voltdots/scripts/snip.sh
$recorder = ~/.voltdots/scripts/record.sh

# --- Core ---
bind = Super, Return, exec, $terminal
bind = Super, E, exec, $filemanager
bind = Super, W, exec, $browser
bind = Super, C, exec, $editor
bind = Super, Space, exec, $launcher
bind = Super, Q, exec, ~/.voltdots/scripts/confirm_close.sh 
bind = Super, F, fullscreen
bind = Super, V, togglefloating
bind = Super, P, pseudo
bind = Super, J, togglesplit

# --- Wallpaper ---
bind = Super+Ctrl, W, exec, ~/.voltdots/scripts/switchwall.sh

# --- Screenshots --
bind = Super+Shift, S, exec, $screenshot
bind = Super+Shift, R, exec, $recorder

# --- Clipboard ---
bind = Super, Semicolon, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Notifications ---
bind = Super, N, exec, swaync-client -t

# --- Workspaces ---
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10
bind = Super, S, togglespecialworkspace, magic 
bind = Super+Alt, S, movetospecialworkspace, magic 

# --- Move window to workspace ---
bind = Super+Shift, 1, movetoworkspace, 1
bind = Super+Shift, 2, movetoworkspace, 2
bind = Super+Shift, 3, movetoworkspace, 3
bind = Super+Shift, 4, movetoworkspace, 4
bind = Super+Shift, 5, movetoworkspace, 5
bind = Super+Shift, 6, movetoworkspace, 6
bind = Super+Shift, 7, movetoworkspace, 7
bind = Super+Shift, 8, movetoworkspace, 8
bind = Super+Shift, 9, movetoworkspace, 9
bind = Super+Shift, 0, movetoworkspace, 10

# --- Focus ---
bind = Super, left,  movefocus, l
bind = Super, right, movefocus, r
bind = Super, up,    movefocus, u
bind = Super, down,  movefocus, d

# --- Move window ---
bind = Super+Shift, left,  movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up,    movewindow, u
bind = Super+Shift, down,  movewindow, d

# --- Resize ---
bind = Super+Ctrl, left,  resizeactive, -40 0
bind = Super+Ctrl, right, resizeactive,  40 0
bind = Super+Ctrl, up,    resizeactive,  0 -40
bind = Super+Ctrl, down,  resizeactive,  0  40

# --- Mouse ---
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# --- Scroll workspaces ---
bind = Super, mouse_down, workspace, e+1
bind = Super, mouse_up,   workspace, e-1

# --- Media ---
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl prev
bindl = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindl = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindl = , XF86MonBrightnessUp,  exec, swayosd-client --brightness raise
bindl = , XF86MonBrightnessDown,exec, swayosd-client --brightness lower

# --- Overview ---
bind = Super, Tab, hyprexpo:expo, toggle

# --- Session ---
bind = Super+Shift, L, exec, hyprlock
bind = Ctrl+Alt, Delete, exec, ~/.voltdots/scripts/powermenu.sh
